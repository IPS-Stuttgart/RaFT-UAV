---
# Keep MegaLinter focused on checks that are useful across these Python repos
# before strict typing, spelling, and security-scan baselines are established.
ENABLE_LINTERS:
  - ACTION_ACTIONLINT
  - COPYPASTE_JSCPD
  - MARKDOWN_MARKDOWNLINT
  - PYTHON_RUFF
  - REPOSITORY_GIT_DIFF
  - YAML_PRETTIER
  - YAML_YAMLLINT
  - YAML_V8R

VALIDATE_ALL_CODEBASE: true
PRINT_ALPACA: false
SHOW_ELAPSED_TIME: true
FLAVOR_SUGGESTIONS: false
GITHUB_COMMENT_REPORTER: false
PYTHON_RUFF_CONFIG_FILE: pyproject.toml

# actionlint's YAML/workflow checks remain enabled. The embedded shellcheck pass
# is disabled because the self-hosted data workflow intentionally uses indented
# multi-line scripts/heredocs that shellcheck parses differently through
# actionlint than GitHub Actions executes them.
ACTION_ACTIONLINT_ARGUMENTS: "-shellcheck="

# This repository contains several compact tracker/CLI variants whose shared
# Kalman-update and argument-parsing boilerplate creates many small false
# positives. Keep jscpd focused on larger, actionable clones.
COPYPASTE_JSCPD_ARGUMENTS: "--min-tokens 500"
