---
name: CI

"on":
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  first-failure:
    name: First failing test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install quietly
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -e ".[dev]"
      - name: Capture first failing test
        run: |
          set +e
          pytest -q --maxfail=1 > first-failure.log 2>&1
          echo "$?" > first-failure.status
          exit 0
      - name: Upload first failure
        uses: actions/upload-artifact@v7
        with:
          name: first-failure
          path: |
            first-failure.log
            first-failure.status
      - name: Preserve failure status
        run: |
          cat first-failure.log
          test "$(cat first-failure.status)" = "0"
