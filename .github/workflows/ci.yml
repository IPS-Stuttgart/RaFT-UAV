---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile importable code and tests
        run: |
          python -m compileall src tests
          if [ -d scripts ]; then python -m compileall scripts; fi

      - name: Lint source and tests
        run: |
          if [ -d scripts ]; then ruff check src scripts tests; else ruff check src tests; fi

      - name: Run unit tests
        id: pytest
        continue-on-error: true
        run: pytest -q --tb=short > pytest-output.log 2>&1

      - name: Upload pytest failure
        if: steps.pytest.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pytest-failure-${{ matrix.python-version }}
          path: pytest-output.log

      - name: Fail after pytest failure
        if: steps.pytest.outcome == 'failure'
        run: exit 1
