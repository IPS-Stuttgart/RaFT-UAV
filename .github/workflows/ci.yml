---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  test:
    name: Python 3.12 diagnostic
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"

      - name: Capture first unit-test failure
        id: pytest
        continue-on-error: true
        run: |
          pytest -x -q > pytest-first-failure.log 2>&1

      - name: Upload pytest diagnostic
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pytest-first-failure
          path: pytest-first-failure.log

      - name: Preserve pytest result
        if: steps.pytest.outcome == 'failure'
        run: exit 1
