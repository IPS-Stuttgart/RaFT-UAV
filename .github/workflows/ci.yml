---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile importable code and tests
        run: |
          python -m compileall src tests
          if [ -d scripts ]; then python -m compileall scripts; fi

      - name: Lint source and tests
        run: |
          if [ -d scripts ]; then ruff check src scripts tests; else ruff check src tests; fi

      - name: Capture unit-test diagnostics
        shell: bash
        run: |
          set +e
          pytest -q --tb=short > pytest.log 2>&1
          status=$?
          printf '%s\n' "$status" > pytest.status
          tail -n 400 pytest.log
          exit 0

      - name: Upload unit-test diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ci-pytest-${{ matrix.python-version }}
          path: |
            pytest.log
            pytest.status
          if-no-files-found: error
