---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  focused-timestamp-assignment:
    name: MMUAD compatibility diagnostic
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package quietly
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"

      - name: Run affected tests
        id: affected-tests
        shell: bash
        run: |
          set +e
          pytest -q -x --tb=short \
            tests/test_mmuad_submission.py \
            tests/test_mmuad_evaluator_csv_reader.py \
            tests/test_mmuad_global_timestamp_assignment.py \
            > pytest-pr1495.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload diagnostic output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr1495-pytest-output
          path: pytest-pr1495.txt
          if-no-files-found: error

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile importable code and tests
        run: |
          python -m compileall src tests
          if [ -d scripts ]; then python -m compileall scripts; fi

      - name: Lint source and tests
        run: |
          if [ -d scripts ]; then ruff check src scripts tests; else ruff check src tests; fi

      - name: Run unit tests
        run: |
          pytest
