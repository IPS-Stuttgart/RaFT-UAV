---
name: CI

"on":
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  oracle-cli-diagnostic:
    name: Oracle CLI diagnostic
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install quietly
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -e ".[dev]"
      - name: Capture exact CLI path
        run: |
          python - <<'PY' > oracle-cli-debug.txt 2>&1
          from pathlib import Path
          import tempfile
          import pandas as pd
          import raft_uav.mmuad.candidate_reservoir as cr

          root = Path(tempfile.mkdtemp())
          candidate_csv = root / "candidates.csv"
          truth_csv = root / "truth.csv"
          output_csv = root / "reservoir.csv"
          oracle_frame_csv = root / "oracle_frames.csv"
          candidate_csv.write_text(
              "sequence_id,time_s,x_m,y_m,z_m,confidence\n"
              "001,0.0,1.0,2.0,3.0,0.9\n",
              encoding="utf-8",
          )
          truth_csv.write_text(candidate_csv.read_text(encoding="utf-8"), encoding="utf-8")

          print("module", cr.__file__)
          print("main", cr.main, cr.main.__module__)
          print("impl_main", cr._IMPL.main, cr._IMPL.main.__module__)
          print("original_main", cr._ORIGINAL_MAIN, cr._ORIGINAL_MAIN.__module__)
          print("impl_loader", cr._IMPL._load_candidate_specs, cr._IMPL._load_candidate_specs.__module__)
          result = cr.main([
              "--candidate", f"raw={candidate_csv}",
              "--output-csv", str(output_csv),
              "--truth-csv", str(truth_csv),
              "--oracle-frame-csv", str(oracle_frame_csv),
          ])
          print("result", result)
          print("reservoir_bytes", output_csv.read_bytes())
          print("oracle_exists", oracle_frame_csv.exists())
          print("oracle_bytes", oracle_frame_csv.read_bytes() if oracle_frame_csv.exists() else None)
          print("candidate_after", pd.read_csv(candidate_csv, dtype=str, keep_default_na=False).to_dict("records"))
          print("truth_after", pd.read_csv(truth_csv, dtype=str, keep_default_na=False).to_dict("records"))
          PY
      - name: Upload oracle CLI diagnostic
        uses: actions/upload-artifact@v7
        with:
          name: oracle-cli-debug
          path: oracle-cli-debug.txt
