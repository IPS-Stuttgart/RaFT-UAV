name: Debug PR 1048 full pytest

on:
  pull_request:
    paths:
      - "src/raft_uav/mmuad/candidate_mixture_group_anchor_mass_topk.py"
      - "src/raft_uav/mmuad/candidate_mixture_group_anchor_mass_topk/**"
      - "tests/test_mmuad_anchor_scored_candidates.py"
      - ".github/workflows/debug_pr_1048_full_pytest.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Capture pytest failures
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short --maxfail=10 > full_pytest.log 2>&1
          status=$?
          tail -n 500 full_pytest.log > full_pytest_tail.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload failure tail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-1048-full-pytest-tail
          path: full_pytest_tail.log
      - name: Fail when pytest failed
        if: steps.pytest.outputs.status != '0'
        run: exit 1
