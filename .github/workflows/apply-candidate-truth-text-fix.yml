---
name: Apply candidate truth text fix

"on":
  push:
    branches: [fix/candidate-reservoir-truth-sequence-text-20260714]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/candidate-reservoir-truth-sequence-text-20260714
      - name: Apply exact source patch
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path("src/raft_uav/mmuad/__init__.py")
          text = source.read_text(encoding="utf-8")
          old = "            truth = _normalize_truth_columns(_pd.read_csv(args.truth_csv))"
          new = (
              "            truth = _normalize_truth_columns(\n"
              "                _pd.read_csv(args.truth_csv, dtype=str, keep_default_na=False)\n"
              "            )"
          )
          if text.count(old) != 1:
              raise SystemExit(f"expected exactly one truth-read guard, found {text.count(old)}")
          source.write_text(text.replace(old, new), encoding="utf-8")
          Path(".github/workflows/apply-candidate-truth-text-fix.yml").unlink()
          PY
      - name: Commit source-only repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/raft_uav/mmuad/__init__.py .github/workflows/apply-candidate-truth-text-fix.yml
          git commit -m "Preserve truth sequence text in candidate reservoir CLI"
          git push origin HEAD:fix/candidate-reservoir-truth-sequence-text-20260714
