name: Debug MMUAD candidate mixture

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  targeted-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run candidate-mixture tests
        id: tests
        shell: bash
        run: |
          set +e
          python -m pytest tests/test_mmuad_candidate_mixture_map.py -vv --tb=long 2>&1 | tee candidate_mixture_test.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload targeted test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: candidate-mixture-test-log
          path: candidate_mixture_test.log
