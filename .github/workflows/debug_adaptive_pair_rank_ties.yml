---
name: Debug adaptive pair rank ties

"on":
  pull_request:
    paths:
      - ".github/workflows/debug_adaptive_pair_rank_ties.yml"
      - "src/raft_uav/mmuad/_adaptive_pair_ranks.py"
      - "src/raft_uav/mmuad/candidate_pair_forward_backward_adaptive/**"
      - "src/raft_uav/mmuad/candidate_pair_forward_backward_agreement/**"
      - "src/raft_uav/mmuad/candidate_pair_forward_backward_agreement_adaptive/**"
      - "tests/test_mmuad_adaptive_pair_rank_ties.py"

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: python -m pip install -q -e ".[dev]"
      - name: Capture focused pytest output
        run: |
          set +e
          pytest -vv --tb=long \
            tests/test_mmuad_candidate_pair_forward_backward_adaptive.py \
            tests/test_mmuad_candidate_pair_forward_backward_agreement.py \
            tests/test_mmuad_candidate_pair_forward_backward_agreement_adaptive.py \
            tests/test_mmuad_adaptive_pair_rank_ties.py \
            > focused-pytest.log 2>&1
          echo "$?" > focused-pytest.status
      - name: Upload focused pytest output
        uses: actions/upload-artifact@v6
        with:
          name: adaptive-pair-rank-ties-pytest
          path: |
            focused-pytest.log
            focused-pytest.status
      - name: Propagate focused pytest status
        run: test "$(cat focused-pytest.status)" = "0"
