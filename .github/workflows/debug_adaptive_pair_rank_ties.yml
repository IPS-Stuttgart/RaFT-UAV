---
name: Debug adaptive pair rank ties

"on":
  pull_request:
    paths:
      - ".github/workflows/debug_adaptive_pair_rank_ties.yml"
      - "src/raft_uav/mmuad/_adaptive_pair_ranks.py"
      - "src/raft_uav/mmuad/candidate_pair_forward_backward_adaptive/**"
      - "src/raft_uav/mmuad/candidate_pair_forward_backward_agreement/**"
      - "src/raft_uav/mmuad/candidate_pair_forward_backward_agreement_adaptive/**"
      - "tests/test_mmuad_adaptive_pair_rank_ties.py"

jobs:
  full-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: python -m pip install -q -e ".[dev]"
      - name: Capture full pytest output
        run: |
          set +e
          pytest -vv --tb=long > full-pytest.log 2>&1
          echo "$?" > full-pytest.status
      - name: Upload full pytest output
        uses: actions/upload-artifact@v6
        with:
          name: adaptive-pair-rank-ties-full-pytest
          path: |
            full-pytest.log
            full-pytest.status
      - name: Propagate full pytest status
        run: test "$(cat full-pytest.status)" = "0"
