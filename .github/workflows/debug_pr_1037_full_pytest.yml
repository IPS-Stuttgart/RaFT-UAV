name: Debug PR 1037 full pytest

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Capture first pytest failures
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short --maxfail=5 > full_pytest.log 2>&1
          status=$?
          tail -n 400 full_pytest.log > full_pytest_tail.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload pytest failure tail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-1037-full-pytest-tail
          path: full_pytest_tail.log
