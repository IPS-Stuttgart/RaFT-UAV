---
name: PR pytest diagnostics

"on":
  pull_request:

permissions:
  contents: read

jobs:
  pytest-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Capture pytest output
        run: |
          set +e
          pytest -q --tb=short > pytest-output.txt 2>&1
          status=$?
          printf '%s\n' "$status" > pytest-exit-code.txt
          exit 0

      - name: Upload pytest diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: |
            pytest-output.txt
            pytest-exit-code.txt

      - name: Propagate pytest status
        run: test "$(cat pytest-exit-code.txt)" -eq 0
