---
name: Focused truth-gated radar sequence

"on":
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip >/tmp/pip-upgrade.log 2>&1
          python -m pip install -e ".[dev]" >/tmp/pip-install.log 2>&1

      - name: Run focused radar-selection tests
        run: |
          pytest -q \
            tests/test_catprob_selection.py \
            tests/test_truth_gated_radar_sequence_boundaries.py
