---
name: MOT diagnostic

"on":
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -e ".[dev]" --quiet

      - name: Capture unit-test transcript
        id: pytest
        shell: bash
        run: |
          set +e
          pytest -q --tb=short > pytest-output.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload unit-test transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mot-diagnostic-pytest
          path: pytest-output.txt

      - name: Propagate unit-test status
        if: always()
        run: exit "${{ steps.pytest.outputs.status }}"
