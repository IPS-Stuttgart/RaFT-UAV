---
name: Diagnose submission tolerance

"on":
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Capture unit-test output
        shell: bash
        run: |
          set +e
          pytest -q --tb=short > pytest.log 2>&1
          status=$?
          cat pytest.log
          printf '%s\n' "$status" > pytest-status.txt
          echo "PYTEST_STATUS=$status" >> "$GITHUB_ENV"
          exit 0

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: submission-tolerance-pytest-log
          path: |
            pytest.log
            pytest-status.txt

      - name: Preserve pytest conclusion
        run: test "$PYTEST_STATUS" -eq 0
