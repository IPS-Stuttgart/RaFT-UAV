name: Debug MMUAD consensus quota

on:
  pull_request:
    paths:
      - "src/raft_uav/mmuad/candidate_consensus_quota.py"
      - "tests/test_mmuad_candidate_consensus_quota.py"
      - ".github/workflows/debug-consensus-quota.yml"

permissions:
  contents: read

jobs:
  focused-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest tests/test_mmuad_candidate_consensus_quota.py -vv --tb=short
