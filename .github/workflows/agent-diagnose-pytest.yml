---
name: Agent diagnose pytest

"on":
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Capture first pytest failure
        shell: bash
        run: |
          set +e
          pytest -x -q > pytest-output.txt 2>&1
          status=$?
          printf '%s\n' "$status" > pytest-status.txt
          tail -n 200 pytest-output.txt
          exit 0

      - name: Upload pytest diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: pytest-first-failure
          path: |
            pytest-output.txt
            pytest-status.txt
          if-no-files-found: error
