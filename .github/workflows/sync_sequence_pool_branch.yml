name: Sync sequence pool branch

on:
  push:
    branches:
      - agent/mmuad-sequence-pool-selector

permissions:
  contents: write

jobs:
  sync-main:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/mmuad-sequence-pool-selector
          fetch-depth: 0
      - name: Merge current main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "main is already contained in the branch"
            exit 0
          fi
          git merge --no-edit origin/main
          git push origin HEAD:agent/mmuad-sequence-pool-selector
