---
name: Agent LTS diagnostic

"on":
  pull_request:

permissions:
  contents: read

jobs:
  first-failure:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -e ".[dev]" --quiet

      - name: Capture first pytest failure
        shell: bash
        run: |
          set +e
          pytest -x -vv > first-failure.log 2>&1
          status=$?
          cat first-failure.log
          exit "$status"

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: first-pytest-failure
          path: first-failure.log
