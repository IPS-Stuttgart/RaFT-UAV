---
name: Agent LTS diagnostic

"on":
  pull_request:

permissions:
  contents: read

jobs:
  targeted-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -e ".[dev]" --quiet

      - name: Run targeted tests
        id: pytest
        shell: bash
        run: |
          set +e
          pytest -vv \
            tests/test_multi_uav_lts.py \
            tests/test_multi_uav_lts_duplicate_zip_members.py \
            tests/test_multi_uav_lts_submission_domains.py \
            > targeted-pytest.log 2>&1
          status=$?
          cat targeted-pytest.log
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: targeted-pytest-log
          path: targeted-pytest.log
