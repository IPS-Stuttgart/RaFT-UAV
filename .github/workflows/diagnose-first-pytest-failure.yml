---
name: Diagnose first pytest failure

"on":
  pull_request:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip >/tmp/pip-upgrade.log 2>&1
          python -m pip install -e ".[dev]" >/tmp/pip-install.log 2>&1

      - name: Capture first pytest failure
        id: pytest
        continue-on-error: true
        run: |
          pytest -x -q --tb=short >pytest-first-failure.txt 2>&1

      - name: Post first failure to the pull request
        if: steps.pytest.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          tail -n 120 pytest-first-failure.txt >pytest-first-failure-tail.txt
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          tail = Path("pytest-first-failure-tail.txt").read_text(encoding="utf-8")
          body = (
              "<!-- raft-uav-first-pytest-failure -->\n"
              "First failing full-suite test on the diagnostic branch head:\n\n"
              "```text\n"
              + tail
              + "\n```"
          )
          Path("comment.json").write_text(
              json.dumps({"body": body}), encoding="utf-8"
          )
          PY
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --data @comment.json

      - name: Preserve pytest outcome
        if: steps.pytest.outcome == 'failure'
        run: exit 1
