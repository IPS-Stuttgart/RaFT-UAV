---
name: Stateful learned radar association

"on":
  pull_request:
    paths:
      - ".github/workflows/stateful-learned-radar-association.yml"
      - "pyproject.toml"
      - "poetry.lock"
      - "src/raft_uav/baselines/stateful_learned_radar_association.py"
      - "src/raft_uav/baselines/learned_radar_association.py"
      - "src/raft_uav/baselines/learned_radar_likelihood.py"
      - "src/raft_uav/baselines/radar_likelihood_training.py"
      - "src/raft_uav/run_learned_radar_association_cli.py"
      - "src/raft_uav/train_radar_association_cli.py"
      - "tests/test_stateful_learned_radar_association.py"
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
    paths:
      - ".github/workflows/stateful-learned-radar-association.yml"
      - "pyproject.toml"
      - "poetry.lock"
      - "src/raft_uav/baselines/stateful_learned_radar_association.py"
      - "src/raft_uav/baselines/learned_radar_association.py"
      - "src/raft_uav/baselines/learned_radar_likelihood.py"
      - "src/raft_uav/baselines/radar_likelihood_training.py"
      - "src/raft_uav/run_learned_radar_association_cli.py"
      - "src/raft_uav/train_radar_association_cli.py"
      - "tests/test_stateful_learned_radar_association.py"
  workflow_dispatch:
    inputs:
      run_aerpaw_smoke:
        description: "Run an optional dataset-backed stateful association smoke test."
        required: false
        type: boolean
        default: false
      dataset_root:
        description: "Path on the self-hosted runner to extracted AADM2025Dryad; if unusable, the workflow searches and populates the persistent dataset cache."
        required: false
        type: string
        default: "/srv/datasets/AADM2025Dryad"
      test_flight:
        description: "Held-out flight used for the stateful-beam smoke run."
        required: false
        type: string
        default: "Opt1"
      beam_max_hypotheses:
        description: "Maximum stateful association hypotheses retained per radar frame."
        required: false
        type: number
        default: 16
      beam_max_candidates:
        description: "Maximum learned candidate branches per hypothesis."
        required: false
        type: number
        default: 6

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  unit:
    name: Unit checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Syntax-check stateful association files
        run: |
          set -euo pipefail
          python -m py_compile \
            src/raft_uav/baselines/stateful_learned_radar_association.py \
            src/raft_uav/run_learned_radar_association_cli.py \
            src/raft_uav/train_radar_association_cli.py \
            tests/test_stateful_learned_radar_association.py

      - name: Exercise learned association CLIs
        run: |
          set -euo pipefail
          python -m raft_uav.train_radar_association_cli --help >/dev/null
          python -m raft_uav.run_learned_radar_association_cli --help >/dev/null

      - name: Run focused stateful association tests
        run: pytest -q tests/test_stateful_learned_radar_association.py

  aerpaw-smoke:
    name: Optional AERPAW stateful-beam smoke
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_aerpaw_smoke }}
    runs-on: [self-hosted, Linux]
    timeout-minutes: 720
    env:
      DATASET_ROOT: ${{ inputs.dataset_root }}
      TEST_FLIGHT: ${{ inputs.test_flight }}
      BEAM_MAX_HYPOTHESES: ${{ inputs.beam_max_hypotheses }}
      BEAM_MAX_CANDIDATES: ${{ inputs.beam_max_candidates }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Resolve dataset input
        env:
          AADM2025DRYAD_RCLONE_SOURCE: ${{ secrets.AADM2025DRYAD_RCLONE_SOURCE }}
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
        run: |
          set -euo pipefail

          dataset_cache_root="$HOME/.cache/datasets"
          dataset_cache_dataset_root="$dataset_cache_root/AADM2025Dryad"
          mkdir -p "$dataset_cache_root"

          resolved_dataset_root_file="$RUNNER_TEMP/resolved_dataset_root.txt"

          find_dataset() {
            python - "$resolved_dataset_root_file" <<'PY'
          from __future__ import annotations

          import os
          import sys
          from pathlib import Path

          resolved_dataset_root_file = Path(sys.argv[1])
          input_root = os.environ.get("DATASET_ROOT", "").strip()
          cache_root = Path.home() / ".cache" / "datasets"
          runner_cache_root = Path.home() / "github-runner" / ".cache" / "datasets"
          rf_dir_names = {"RF Sensor and Radar", "RF_Sensor_and_Radar"}

          def unique_paths(paths: list[Path]) -> list[Path]:
              seen: set[Path] = set()
              unique: list[Path] = []
              for path in paths:
                  expanded = path.expanduser()
                  if expanded in seen:
                      continue
                  seen.add(expanded)
                  unique.append(expanded)
              return unique

          def find_rf_root(root: Path, max_depth: int = 6) -> Path | None:
              if not root.is_dir():
                  return None
              if root.name in rf_dir_names:
                  return root
              for name in rf_dir_names:
                  direct = root / name
                  if direct.is_dir():
                      return direct
              root_depth = len(root.parts)
              for dirpath, dirnames, _ in os.walk(root):
                  current = Path(dirpath)
                  if len(current.parts) - root_depth >= max_depth:
                      dirnames[:] = []
                  if current.name in rf_dir_names:
                      return current
              return None

          roots: list[Path] = []
          if input_root:
              requested = Path(input_root)
              roots.extend([requested, requested.parent, requested.parent.parent])
          roots.extend(
              [
                  cache_root / "AADM2025Dryad",
                  cache_root,
                  runner_cache_root / "AADM2025Dryad",
                  runner_cache_root,
                  Path("/srv/datasets/AADM2025Dryad"),
                  Path("/srv/datasets"),
                  Path("/data/AADM2025Dryad"),
                  Path("/data"),
                  Path("/mnt/data/AADM2025Dryad"),
                  Path("/mnt/data"),
                  Path.home() / "AADM2025Dryad",
                  Path.home(),
              ]
          )

          searched: list[str] = []
          for root in unique_paths(roots):
              searched.append(str(root))
              rf_root = find_rf_root(root)
              if rf_root is None:
                  continue
              dataset_root = rf_root.parent
              resolved_dataset_root_file.write_text(str(dataset_root), encoding="utf-8")
              print(f"Resolved dataset_root={dataset_root}")
              print(f"Resolved RF Sensor and Radar root={rf_root}")
              raise SystemExit(0)

          print("Could not locate an RF Sensor and Radar directory.", file=sys.stderr)
          print(f"Input dataset_root={input_root!r}", file=sys.stderr)
          print("Searched roots:", file=sys.stderr)
          for path in searched:
              print(f"- {path}", file=sys.stderr)
          raise SystemExit(1)
          PY
          }

          ensure_rclone() {
            if command -v rclone >/dev/null 2>&1; then
              return 0
            fi
            echo "rclone is not installed; installing a temporary copy in RUNNER_TEMP."
            mkdir -p "$RUNNER_TEMP/rclone-bin" "$RUNNER_TEMP/rclone-download"
            curl -fsSL https://downloads.rclone.org/rclone-current-linux-amd64.zip \
              -o "$RUNNER_TEMP/rclone.zip"
            python -m zipfile -e "$RUNNER_TEMP/rclone.zip" "$RUNNER_TEMP/rclone-download"
            rclone_bin="$(find "$RUNNER_TEMP/rclone-download" -type f -name rclone -print -quit)"
            if [ -z "$rclone_bin" ]; then
              echo "Could not find rclone binary after extracting download." >&2
              exit 1
            fi
            cp "$rclone_bin" "$RUNNER_TEMP/rclone-bin/rclone"
            chmod +x "$RUNNER_TEMP/rclone-bin/rclone"
            export PATH="$RUNNER_TEMP/rclone-bin:$PATH"
            echo "$RUNNER_TEMP/rclone-bin" >> "$GITHUB_PATH"
          }

          write_rclone_config() {
            rclone_config_file="$RUNNER_TEMP/rclone.conf"
            if [ -n "${RCLONE_CONFIG_B64:-}" ]; then
              printf '%s' "$RCLONE_CONFIG_B64" | base64 --decode > "$rclone_config_file"
            elif [ -n "${RCLONE_CONFIG:-}" ]; then
              printf '%s' "$RCLONE_CONFIG" > "$rclone_config_file"
            else
              echo "AADM2025Dryad was not found locally, and neither RCLONE_CONFIG nor RCLONE_CONFIG_B64 is configured." >&2
              echo "Set AADM2025DRYAD_RCLONE_SOURCE plus one of RCLONE_CONFIG or RCLONE_CONFIG_B64 as GitHub secrets." >&2
              exit 1
            fi
            chmod 600 "$rclone_config_file"
            echo "$rclone_config_file"
          }

          download_dataset_cache() {
            if [ -z "${AADM2025DRYAD_RCLONE_SOURCE:-}" ]; then
              echo "AADM2025Dryad was not found locally, and AADM2025DRYAD_RCLONE_SOURCE is not configured." >&2
              echo "Set AADM2025DRYAD_RCLONE_SOURCE to the rclone remote path for the extracted AADM2025Dryad dataset." >&2
              exit 1
            fi
            ensure_rclone
            rclone_config_file="$(write_rclone_config)"
            staging="${dataset_cache_dataset_root}.tmp.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
            rm -rf "$staging"
            mkdir -p "$staging"
            echo "Dataset not found locally; downloading with rclone into $dataset_cache_dataset_root."
            rclone copy "$AADM2025DRYAD_RCLONE_SOURCE" "$staging" \
              --config "$rclone_config_file" \
              --fast-list \
              --transfers 8 \
              --checkers 16
            if ! find "$staging" -type d -name "RF Sensor and Radar" -print -quit | grep -q .; then
              echo "rclone download completed, but no RF Sensor and Radar directory was found in $staging." >&2
              find "$staging" -maxdepth 4 -type d | sed -n '1,120p' >&2 || true
              rm -rf "$staging"
              exit 1
            fi
            rm -rf "$dataset_cache_dataset_root"
            mv "$staging" "$dataset_cache_dataset_root"
            echo "Cached dataset at $dataset_cache_dataset_root"
          }

          if ! find_dataset; then
            lock_file="$dataset_cache_root/.AADM2025Dryad.lock"
            (
              flock 9
              if ! find_dataset; then
                download_dataset_cache
              fi
            ) 9>"$lock_file"
          fi

          find_dataset
          DATASET_ROOT="$(cat "$resolved_dataset_root_file")"
          echo "DATASET_ROOT=$DATASET_ROOT" >> "$GITHUB_ENV"
          if ! find "$DATASET_ROOT" -type d -name "RF Sensor and Radar" -print -quit | grep -q .; then
            echo "Resolved dataset_root does not contain an RF Sensor and Radar directory: $DATASET_ROOT" >&2
            exit 1
          fi
          du -sh "$DATASET_ROOT" || true

      - name: Install package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Train leave-flight-out radar association model
        run: |
          set -euo pipefail
          mkdir -p outputs/stateful_radar_association_smoke
          python -m raft_uav.train_radar_association_cli "$DATASET_ROOT" \
            --exclude-flight "$TEST_FLIGHT" \
            --disable-radar-catprob-threshold \
            --output-model outputs/stateful_radar_association_smoke/radar_assoc.json \
            --output-examples outputs/stateful_radar_association_smoke/radar_assoc_examples.csv

      - name: Run stateful-beam learned association smoke
        run: |
          set -euo pipefail
          python -m raft_uav.run_learned_radar_association_cli "$DATASET_ROOT" \
            --flight "$TEST_FLIGHT" \
            --model outputs/stateful_radar_association_smoke/radar_assoc.json \
            --association-mode stateful-beam \
            --disable-radar-catprob-threshold \
            --beam-max-hypotheses "$BEAM_MAX_HYPOTHESES" \
            --beam-max-candidates "$BEAM_MAX_CANDIDATES" \
            --beam-track-switch-cost 3.0 \
            --beam-lag-s 20 \
            --robust-update nis-inflate \
            --smoother fixed-lag \
            --smoother-lag-s 20 \
            --output-dir outputs/stateful_radar_association_smoke/run

      - name: Summarize smoke metrics
        if: always()
        run: |
          set -euo pipefail
          metrics="outputs/stateful_radar_association_smoke/run/$TEST_FLIGHT/metrics.json"
          {
            echo "## Stateful learned radar association smoke"
            echo
            echo "test_flight=$TEST_FLIGHT"
            echo
            if [ -f "$metrics" ]; then
              echo "### Metrics"
              echo '```json'
              python - <<'PY'
          import json
          import os
          from pathlib import Path

          test_flight = os.environ["TEST_FLIGHT"]
          metrics = Path("outputs/stateful_radar_association_smoke/run") / test_flight / "metrics.json"
          payload = json.loads(metrics.read_text())
          summary = {
              "flight": payload.get("flight"),
              "radar_association": payload.get("radar_association"),
              "selected_radar_rows": payload.get("selected_radar_rows"),
              "rmse_3d_m": payload.get("position_error_3d", {}).get("rmse_m"),
              "p95_3d_m": payload.get("position_error_3d", {}).get("p95_m"),
              "stateful_learned_association": payload.get("stateful_learned_association"),
          }
          print(json.dumps(summary, indent=2))
          PY
              echo '```'
            else
              echo "No metrics file was produced."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: stateful-learned-radar-association-${{ github.run_id }}
          retention-days: 14
          path: |
            outputs/stateful_radar_association_smoke/radar_assoc.json
            outputs/stateful_radar_association_smoke/radar_assoc_examples.csv
            outputs/stateful_radar_association_smoke/run/*/metrics.json
            outputs/stateful_radar_association_smoke/run/*/diagnostics.csv
            outputs/stateful_radar_association_smoke/run/*/selected_radar.csv
            outputs/stateful_radar_association_smoke/run/*/trajectory.png
