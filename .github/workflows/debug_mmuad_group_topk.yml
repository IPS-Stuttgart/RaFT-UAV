---
name: Debug MMUAD group top-K

"on":
  pull_request:
    paths:
      - "src/raft_uav/mmuad/candidate_mixture_group_topk.py"
      - "tests/test_mmuad_candidate_mixture_group_topk.py"
      - ".github/workflows/debug_mmuad_group_topk.yml"

jobs:
  focused-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install package
        run: python -m pip install -q -e ".[dev]" >/dev/null
      - name: Run full unit suite and capture output
        shell: bash
        run: |
          set +e
          pytest -q --tb=short > pytest.log 2>&1
          status=$?
          echo "$status" > pytest-status.txt
          exit 0
      - name: Upload pytest log
        uses: actions/upload-artifact@v6
        with:
          name: mmuad-group-topk-pytest-log
          path: |
            pytest.log
            pytest-status.txt
      - name: Propagate pytest status
        shell: bash
        run: exit "$(cat pytest-status.txt)"
