---
name: Debug MMUAD group top-K

"on":
  pull_request:
    paths:
      - "src/raft_uav/mmuad/candidate_mixture_group_topk.py"
      - "tests/test_mmuad_candidate_mixture_group_topk.py"
      - ".github/workflows/debug_mmuad_group_topk.yml"

jobs:
  focused-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run focused tests
        run: |
          python -m pip install -q -e ".[dev]" >/dev/null
          pytest tests/test_mmuad_candidate_mixture_group_topk.py -q --tb=short
