name: Debug regularizer weights lint

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Lint regularizer weight patch
        run: |
          ruff check \
            src/raft_uav/mmuad/track5_trajectory_regularizer/__init__.py \
            src/raft_uav/mmuad/track5_trajectory_regularizer/__main__.py \
            tests/test_mmuad_track5_trajectory_regularizer_final_weights.py
