name: Debug regularizer weights lint

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Lint regularizer weight patch
        id: lint
        shell: bash
        run: |
          set +e
          ruff check \
            src/raft_uav/mmuad/track5_trajectory_regularizer/__init__.py \
            src/raft_uav/mmuad/track5_trajectory_regularizer/__main__.py \
            tests/test_mmuad_track5_trajectory_regularizer_final_weights.py \
            > regularizer_weights_ruff.log 2>&1
          status=$?
          cat regularizer_weights_ruff.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload Ruff diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regularizer-weights-ruff-log
          path: regularizer_weights_ruff.log
