name: Apply paper selection partial-index fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: agent-fix-paper-selection-partial-index
  cancel-in-progress: true

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-paper-selection-partial-index-20260714
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply source and regression patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source_path = Path("src/raft_uav/paper_selection.py")
          source = source_path.read_text(encoding="utf-8")
          old = (
              "        sort_columns = [\n"
              "            column\n"
              "            for column in (\"frame_index\", \"time_s\", \"track_index\")\n"
              "            if column in track_rows.columns\n"
              "        ]\n"
              "        ordered = track_rows.sort_values(sort_columns).reset_index(drop=True)\n"
              "        frame_values = (\n"
              "            pd.to_numeric(ordered[\"frame_index\"], errors=\"coerce\")"
              ".to_numpy(dtype=float)\n"
              "            if \"frame_index\" in ordered.columns\n"
              "            else ordered[\"time_s\"].to_numpy(dtype=float)\n"
              "        )\n"
          )
          new = (
              "        frame_index = (\n"
              "            pd.to_numeric(track_rows[\"frame_index\"], errors=\"coerce\")\n"
              "            if \"frame_index\" in track_rows.columns\n"
              "            else None\n"
              "        )\n"
              "        use_frame_index = frame_index is not None and bool(\n"
              "            np.isfinite(frame_index).all()\n"
              "        )\n"
              "        sort_candidates = (\n"
              "            (\"frame_index\", \"time_s\", \"track_index\")\n"
              "            if use_frame_index\n"
              "            else (\"time_s\", \"track_index\")\n"
              "        )\n"
              "        sort_columns = [\n"
              "            column for column in sort_candidates if column in track_rows.columns\n"
              "        ]\n"
              "        ordered = track_rows.sort_values(\n"
              "            sort_columns, kind=\"mergesort\"\n"
              "        ).reset_index(drop=True)\n"
              "        frame_column = \"frame_index\" if use_frame_index else \"time_s\"\n"
              "        frame_values = pd.to_numeric(\n"
              "            ordered[frame_column], errors=\"coerce\"\n"
              "        ).to_numpy(dtype=float)\n"
          )
          if source.count(old) != 1:
              raise SystemExit(f"expected one source block, found {source.count(old)}")
          source_path.write_text(source.replace(old, new), encoding="utf-8")

          test_path = Path("tests/test_paper_selection_partial_frame_index.py")
          test_path.write_text(
              textwrap.dedent(
                  """\
                  from __future__ import annotations

                  import numpy as np
                  import pandas as pd

                  from raft_uav.paper_selection import select_paper_strict_raw_radar_track


                  def test_partial_frame_indices_fall_back_to_time_continuity() -> None:
                      radar = pd.DataFrame(
                          {
                              "time_s": [0.0, 1.0, 10.0],
                              "frame_index": [0.0, np.nan, 2.0],
                              "track_id": [7, 7, 7],
                              "track_index": [0, 1, 2],
                              "cat_prob_uav": [0.5, 0.5, 0.5],
                          }
                      )

                      selected = select_paper_strict_raw_radar_track(radar)

                      assert selected["time_s"].tolist() == [0.0, 1.0]


                  def test_complete_frame_indices_remain_authoritative() -> None:
                      radar = pd.DataFrame(
                          {
                              "time_s": [0.0, 100.0, 101.0],
                              "frame_index": [0, 1, 10],
                              "track_id": [7, 7, 7],
                              "track_index": [0, 1, 2],
                              "cat_prob_uav": [0.5, 0.5, 0.5],
                          }
                      )

                      selected = select_paper_strict_raw_radar_track(radar)

                      assert selected["time_s"].tolist() == [0.0, 100.0]
                  """
              ),
              encoding="utf-8",
          )
          PY

      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run focused validation
        run: |
          python -m pytest tests/test_paper_selection_partial_frame_index.py -q
          python -m ruff check src/raft_uav/paper_selection.py tests/test_paper_selection_partial_frame_index.py
          python -m py_compile src/raft_uav/paper_selection.py tests/test_paper_selection_partial_frame_index.py

      - name: Commit validated fix
        run: |
          rm .github/workflows/agent-fix-paper-selection-partial-index.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/raft_uav/paper_selection.py tests/test_paper_selection_partial_frame_index.py .github/workflows/agent-fix-paper-selection-partial-index.yml
          git commit -m "Fix paper track segmentation with partial frame indices"
          git push origin HEAD:agent/fix-paper-selection-partial-index-20260714
