---
name: Diagnose PR 1428 pytest

"on":
  push:
    branches: [agent/preserve-sequence-id-csv-semantics]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  pytest-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Capture pytest result
        shell: bash
        run: |
          set +e
          pytest -q --tb=short > pytest.log 2>&1
          status=$?
          printf '%s\n' "$status" > pytest.status
          tail -n 400 pytest.log
          exit 0

      - name: Upload pytest diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: pr-1428-pytest-diagnostic
          path: |
            pytest.log
            pytest.status
          if-no-files-found: error
