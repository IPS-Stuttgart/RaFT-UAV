---
name: Validate PR 1601 Fix

"on":
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Capture focused validation
        shell: bash
        run: |
          set +e
          ruff check \
            src/raft_uav/calibration/empirical_covariance.py \
            tests/test_empirical_covariance.py \
            > focused-ruff-output.txt 2>&1
          ruff_status=$?
          pytest -q tests/test_empirical_covariance.py \
            > focused-pytest-output.txt 2>&1
          pytest_status=$?
          cat focused-ruff-output.txt
          cat focused-pytest-output.txt
          printf '%s\n' "$ruff_status" > focused-ruff-status.txt
          printf '%s\n' "$pytest_status" > focused-pytest-status.txt
          exit 0

      - name: Upload focused validation
        uses: actions/upload-artifact@v4
        with:
          name: pr1601-focused-validation
          path: |
            focused-ruff-output.txt
            focused-ruff-status.txt
            focused-pytest-output.txt
            focused-pytest-status.txt
