---
name: Diagnose PR 1495

"on":
  push:
    branches: [agent/global-track5-timestamp-assignment-v2]

permissions:
  contents: read

jobs:
  focused-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package quietly
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"

      - name: Run focused timestamp-assignment tests
        run: pytest -vv tests/test_mmuad_global_timestamp_assignment.py
