---
name: Stateful learned radar association LOFO

on:
  workflow_dispatch:
    inputs:
      dataset_root:
        description: "Path on the self-hosted runner to extracted AADM2025Dryad; if unusable, the workflow searches common runner locations."
        required: false
        type: string
        default: "/srv/datasets/AADM2025Dryad"
      flights_json:
        description: "JSON array of held-out flights."
        required: true
        type: string
        default: '["Opt1","Opt2","Opt3"]'
      beam_max_hypotheses:
        description: "Maximum stateful association hypotheses retained per radar frame."
        required: true
        type: number
        default: 32
      beam_max_candidates:
        description: "Maximum learned candidate branches per hypothesis."
        required: true
        type: number
        default: 8
      beam_track_switch_cost:
        description: "Penalty for switching Fortem track IDs."
        required: true
        type: number
        default: 3.0
      beam_lag_s:
        description: "Association look-ahead/commitment lag in seconds."
        required: true
        type: number
        default: 20
      smoother_lag_s:
        description: "Fixed-lag RTS smoother lag in seconds."
        required: true
        type: number
        default: 20
      rf_inflation_alpha:
        description: "Soft NIS covariance-inflation exponent for RF."
        required: true
        type: number
        default: 0.5
      radar_inflation_alpha:
        description: "Soft NIS covariance-inflation exponent for radar."
        required: true
        type: number
        default: 0.5
      enforce_thresholds:
        description: "Fail the workflow if target metrics are not met."
        required: true
        type: boolean
        default: false
      target_mean_rmse_3d_m:
        description: "Target mean 3D RMSE across held-out flights."
        required: true
        type: number
        default: 95
      target_opt1_p95_3d_m:
        description: "Target Opt1 3D P95 tail error."
        required: true
        type: number
        default: 200

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  lofo:
    name: LOFO ${{ matrix.flight }}
    runs-on: [self-hosted, Linux]
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        flight: ${{ fromJSON(inputs.flights_json) }}

    env:
      DATASET_ROOT: ${{ inputs.dataset_root }}
      TEST_FLIGHT: ${{ matrix.flight }}
      OUT_DIR: outputs/stateful_lofo/${{ matrix.flight }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Validate dataset input
        run: |
          set -euo pipefail
          mkdir -p "$OUT_DIR"

          resolved_dataset_root_file="$RUNNER_TEMP/resolved_dataset_root.txt"
          resolved_rf_root_file="$RUNNER_TEMP/resolved_rf_sensor_and_radar_root.txt"

          python - "$resolved_dataset_root_file" "$resolved_rf_root_file" <<'PY'
          from __future__ import annotations

          import os
          import sys
          from pathlib import Path

          resolved_dataset_root_file = Path(sys.argv[1])
          resolved_rf_root_file = Path(sys.argv[2])
          input_root = os.environ.get("DATASET_ROOT", "").strip()

          RF_DIR_NAMES = {"RF Sensor and Radar", "RF_Sensor_and_Radar"}

          def unique_paths(paths: list[Path]) -> list[Path]:
              seen: set[Path] = set()
              out: list[Path] = []
              for path in paths:
                  try:
                      expanded = path.expanduser()
                  except RuntimeError:
                      continue
                  if expanded in seen:
                      continue
                  seen.add(expanded)
                  out.append(expanded)
              return out

          def find_rf_root(root: Path, max_depth: int = 6) -> Path | None:
              if not root.exists() or not root.is_dir():
                  return None
              if root.name in RF_DIR_NAMES:
                  return root
              for name in RF_DIR_NAMES:
                  direct = root / name
                  if direct.is_dir():
                      return direct

              root_depth = len(root.parts)
              for dirpath, dirnames, _ in os.walk(root):
                  current = Path(dirpath)
                  depth = len(current.parts) - root_depth
                  if depth >= max_depth:
                      dirnames[:] = []
                  if current.name in RF_DIR_NAMES:
                      return current
              return None

          roots: list[Path] = []
          if input_root:
              requested = Path(input_root)
              roots.extend([
                  requested,
                  requested.parent,
                  requested.parent.parent,
              ])
          roots.extend([
              Path("/srv/datasets/AADM2025Dryad"),
              Path("/srv/datasets"),
              Path("/srv"),
              Path("/data/AADM2025Dryad"),
              Path("/data"),
              Path("/mnt/data/AADM2025Dryad"),
              Path("/mnt/data"),
              Path.home() / "AADM2025Dryad",
              Path.home(),
              Path("/home/github-runner/AADM2025Dryad"),
              Path("/home/github-runner"),
          ])

          searched: list[str] = []
          for root in unique_paths(roots):
              searched.append(str(root))
              rf_root = find_rf_root(root)
              if rf_root is None:
                  continue
              # The CLIs accept the extracted Dryad root. Use the parent of the
              # RF Sensor and Radar folder so both direct and recursive lookup work.
              dataset_root = rf_root.parent
              resolved_dataset_root_file.write_text(str(dataset_root), encoding="utf-8")
              resolved_rf_root_file.write_text(str(rf_root), encoding="utf-8")
              print(f"Resolved dataset_root={dataset_root}")
              print(f"Resolved RF Sensor and Radar root={rf_root}")
              raise SystemExit(0)

          print("Could not locate an RF Sensor and Radar directory.", file=sys.stderr)
          print(f"Input dataset_root={input_root!r}", file=sys.stderr)
          print("Searched roots:", file=sys.stderr)
          for path in searched:
              print(f"- {path}", file=sys.stderr)
          raise SystemExit(1)
          PY

          DATASET_ROOT="$(cat "$resolved_dataset_root_file")"
          RF_SENSOR_AND_RADAR_ROOT="$(cat "$resolved_rf_root_file")"
          echo "DATASET_ROOT=$DATASET_ROOT" >> "$GITHUB_ENV"
          echo "RF_SENSOR_AND_RADAR_ROOT=$RF_SENSOR_AND_RADAR_ROOT" >> "$GITHUB_ENV"
          echo "Resolved DATASET_ROOT=$DATASET_ROOT"
          echo "Resolved RF_SENSOR_AND_RADAR_ROOT=$RF_SENSOR_AND_RADAR_ROOT"

          du -sh "$DATASET_ROOT" || true

      - name: Install package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify learned-association CLIs
        run: |
          set -euo pipefail
          python -m raft_uav.train_radar_association_cli --help >/dev/null
          python -m raft_uav.run_learned_radar_association_cli --help >/dev/null

      - name: Train leave-flight-out radar association model
        run: |
          set -euo pipefail
          mkdir -p "$OUT_DIR"

          python -m raft_uav.train_radar_association_cli "$DATASET_ROOT" \
            --exclude-flight "$TEST_FLIGHT" \
            --disable-radar-catprob-threshold \
            --output-model "$OUT_DIR/radar_assoc.json" \
            --output-examples "$OUT_DIR/radar_assoc_examples.csv"

      - name: Run held-out stateful-beam association
        run: |
          set -euo pipefail

          python -m raft_uav.run_learned_radar_association_cli "$DATASET_ROOT" \
            --flight "$TEST_FLIGHT" \
            --model "$OUT_DIR/radar_assoc.json" \
            --association-mode stateful-beam \
            --disable-radar-catprob-threshold \
            --beam-max-hypotheses "${{ inputs.beam_max_hypotheses }}" \
            --beam-max-candidates "${{ inputs.beam_max_candidates }}" \
            --beam-track-switch-cost "${{ inputs.beam_track_switch_cost }}" \
            --beam-lag-s "${{ inputs.beam_lag_s }}" \
            --robust-update nis-inflate \
            --rf-inflation-alpha "${{ inputs.rf_inflation_alpha }}" \
            --radar-inflation-alpha "${{ inputs.radar_inflation_alpha }}" \
            --smoother fixed-lag \
            --smoother-lag-s "${{ inputs.smoother_lag_s }}" \
            --output-dir "$OUT_DIR/run"

      - name: Write per-flight summary
        if: always()
        run: |
          set -euo pipefail
          mkdir -p "$OUT_DIR"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          flight = os.environ["TEST_FLIGHT"]
          out_dir = Path(os.environ["OUT_DIR"])
          metrics_path = out_dir / "run" / flight / "metrics.json"
          summary_path = out_dir / "summary.json"

          summary = {
              "flight": flight,
              "status": "missing_metrics",
              "metrics_path": str(metrics_path),
          }

          if metrics_path.exists():
              payload = json.loads(metrics_path.read_text(encoding="utf-8"))
              summary = {
                  "flight": payload.get("flight", flight),
                  "status": "ok",
                  "radar_association": payload.get("radar_association"),
                  "learned_radar_association_mode": payload.get("learned_radar_association_mode"),
                  "selected_radar_rows": payload.get("selected_radar_rows"),
                  "posterior_records": payload.get("posterior_records"),
                  "rmse_2d_m": payload.get("position_error_2d", {}).get("rmse_m"),
                  "p95_2d_m": payload.get("position_error_2d", {}).get("p95_m"),
                  "rmse_3d_m": payload.get("position_error_3d", {}).get("rmse_m"),
                  "p95_3d_m": payload.get("position_error_3d", {}).get("p95_m"),
                  "metrics_path": str(metrics_path),
              }

          summary_path.parent.mkdir(parents=True, exist_ok=True)
          summary_path.write_text(json.dumps(summary, indent=2), encoding="utf-8")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write(f"## LOFO {flight}\n\n")
              handle.write("```json\n")
              handle.write(json.dumps(summary, indent=2))
              handle.write("\n```\n")
          PY

      - name: Upload LOFO artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stateful-lofo-${{ matrix.flight }}
          retention-days: 30
          path: |
            ${{ env.OUT_DIR }}/summary.json
            ${{ env.OUT_DIR }}/radar_assoc.json
            ${{ env.OUT_DIR }}/radar_assoc_examples.csv
            ${{ env.OUT_DIR }}/run/*/metrics.json
            ${{ env.OUT_DIR }}/run/*/diagnostics.csv
            ${{ env.OUT_DIR }}/run/*/selected_radar.csv
            ${{ env.OUT_DIR }}/run/*/estimates.csv
            ${{ env.OUT_DIR }}/run/*/hypotheses.csv
            ${{ env.OUT_DIR }}/run/*/trajectory.png

  aggregate:
    name: Aggregate LOFO metrics
    needs: lofo
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 30

    env:
      ENFORCE_THRESHOLDS: ${{ inputs.enforce_thresholds }}
      TARGET_MEAN_RMSE_3D_M: ${{ inputs.target_mean_rmse_3d_m }}
      TARGET_OPT1_P95_3D_M: ${{ inputs.target_opt1_p95_3d_m }}

    steps:
      - name: Download LOFO artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Aggregate metrics
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          root = Path("artifacts")
          rows = []
          for summary_path in sorted(root.glob("**/summary.json")):
              try:
                  row = json.loads(summary_path.read_text(encoding="utf-8"))
              except Exception as exc:
                  rows.append({
                      "flight": str(summary_path),
                      "status": f"failed_to_read_summary: {exc}",
                      "rmse_3d_m": None,
                      "p95_3d_m": None,
                  })
                  continue
              rows.append(row)

          rows.sort(key=lambda item: str(item.get("flight", "")))

          ok_rows = [
              row for row in rows
              if row.get("status") == "ok"
              and isinstance(row.get("rmse_3d_m"), (int, float))
              and isinstance(row.get("p95_3d_m"), (int, float))
          ]

          mean_rmse_3d = (
              sum(float(row["rmse_3d_m"]) for row in ok_rows) / len(ok_rows)
              if ok_rows else None
          )
          mean_p95_3d = (
              sum(float(row["p95_3d_m"]) for row in ok_rows) / len(ok_rows)
              if ok_rows else None
          )

          opt1 = next((row for row in ok_rows if str(row.get("flight")) == "Opt1"), None)

          summary = {
              "completed_flights": len(ok_rows),
              "mean_rmse_3d_m": mean_rmse_3d,
              "mean_p95_3d_m": mean_p95_3d,
              "flights": rows,
          }

          Path("lofo_aggregate_summary.json").write_text(
              json.dumps(summary, indent=2),
              encoding="utf-8",
          )

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("## Stateful learned radar association LOFO summary\n\n")
              handle.write("| Flight | Status | 3D RMSE m | 3D P95 m | Selected radar rows |\n")
              handle.write("|---|---:|---:|---:|---:|\n")
              for row in rows:
                  rmse = row.get("rmse_3d_m")
                  p95 = row.get("p95_3d_m")
                  selected = row.get("selected_radar_rows")
                  handle.write(
                      f"| {row.get('flight')} | {row.get('status')} | "
                      f"{rmse if rmse is not None else 'NA'} | "
                      f"{p95 if p95 is not None else 'NA'} | "
                      f"{selected if selected is not None else 'NA'} |\n"
                  )
              handle.write("\n")
              handle.write(f"Mean 3D RMSE: **{mean_rmse_3d if mean_rmse_3d is not None else 'NA'} m**\n\n")
              handle.write(f"Mean 3D P95: **{mean_p95_3d if mean_p95_3d is not None else 'NA'} m**\n\n")

          enforce = os.environ.get("ENFORCE_THRESHOLDS", "false").lower() == "true"
          if enforce:
              target_mean_rmse = float(os.environ["TARGET_MEAN_RMSE_3D_M"])
              target_opt1_p95 = float(os.environ["TARGET_OPT1_P95_3D_M"])

              failures = []
              if mean_rmse_3d is None:
                  failures.append("mean_rmse_3d_m is unavailable")
              elif mean_rmse_3d > target_mean_rmse:
                  failures.append(
                      f"mean_rmse_3d_m={mean_rmse_3d:.3f} exceeds target {target_mean_rmse:.3f}"
                  )

              if opt1 is None:
                  failures.append("Opt1 metrics are unavailable")
              elif float(opt1["p95_3d_m"]) > target_opt1_p95:
                  failures.append(
                      f"Opt1 p95_3d_m={float(opt1['p95_3d_m']):.3f} exceeds target {target_opt1_p95:.3f}"
                  )

              if failures:
                  print("Threshold failures:")
                  for failure in failures:
                      print(f"- {failure}")
                  sys.exit(1)

          PY

      - name: Upload aggregate summary
        uses: actions/upload-artifact@v4
        with:
          name: stateful-lofo-aggregate-summary
          retention-days: 30
          path: lofo_aggregate_summary.json
