---
name: Stateful learned radar association LOFO

on:
  workflow_dispatch:
    inputs:
      dataset_root:
        description: "Path on the self-hosted runner to extracted AADM2025Dryad; if unusable, the workflow searches common runner locations."
        required: false
        type: string
        default: "/srv/datasets/AADM2025Dryad"
      dataset_url:
        description: "Optional direct ZIP archive URL used if the dataset is not already present on the runner."
        required: false
        type: string
        default: ""
      flights_json:
        description: "Held-out flights as JSON or shorthand, e.g. [\"Opt1\",\"Opt2\"] or [Opt1,Opt2]."
        required: true
        type: string
        default: '["Opt1","Opt2","Opt3"]'
      smoke_mode:
        description: "Run Opt1/Opt3 smoke validation for dataset, CLIs, and required artifacts; never fail on metric targets."
        required: true
        type: boolean
        default: false
      beam_max_hypotheses:
        description: "Maximum stateful association hypotheses retained per radar frame."
        required: true
        type: number
        default: 32
      beam_max_candidates:
        description: "Maximum learned candidate branches per hypothesis."
        required: true
        type: number
        default: 8
      beam_track_switch_cost:
        description: "Penalty for switching Fortem track IDs."
        required: true
        type: number
        default: 3.0
      beam_lag_s:
        description: "Association look-ahead/commitment lag in seconds."
        required: true
        type: number
        default: 20
      smoother_lag_s:
        description: "Fixed-lag RTS smoother lag in seconds."
        required: true
        type: number
        default: 20
      rf_inflation_alpha:
        description: "Soft NIS covariance-inflation exponent for RF."
        required: true
        type: number
        default: 0.5
      radar_inflation_alpha:
        description: "Soft NIS covariance-inflation exponent for radar."
        required: true
        type: number
        default: 0.5
      rf_max_residual_m:
        description: "Hard Euclidean RF residual cap before Kalman update; <=0 disables it."
        required: true
        type: number
        default: 750
      radar_max_residual_m:
        description: "Hard Euclidean radar residual cap before Kalman update; <=0 disables it."
        required: true
        type: number
        default: 0
      radar_catprob_threshold:
        description: "Fortem radar category probability threshold."
        required: true
        type: number
        default: 0.40
      enforce_thresholds:
        description: "Fail the workflow if target metrics are not met."
        required: true
        type: boolean
        default: false
      target_mean_rmse_3d_m:
        description: "Target mean 3D RMSE across held-out flights."
        required: true
        type: number
        default: 95
      target_opt1_p95_3d_m:
        description: "Target Opt1 3D P95 tail error."
        required: true
        type: number
        default: 200

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  lofo:
    name: LOFO ${{ matrix.flight }}
    runs-on: [self-hosted, Linux]
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        flight: [Opt1, Opt2, Opt3]

    env:
      DATASET_ROOT: ${{ inputs.dataset_root }}
      TEST_FLIGHT: ${{ matrix.flight }}
      OUT_SUBDIR: stateful_lofo/${{ matrix.flight }}
      RAW_REQUESTED_FLIGHTS: ${{ inputs.smoke_mode && '[Opt1,Opt3]' || inputs.flights_json }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Decide whether to run this flight
        run: |
          set -euo pipefail
          requested=",$(printf '%s' "$RAW_REQUESTED_FLIGHTS" | tr -d '[]"' | tr -d "'" | tr -d '[:space:]'),"
          if [[ "$requested" == *",$TEST_FLIGHT,"* ]]; then
            echo "SELECTED_FLIGHT=true" >> "$GITHUB_ENV"
            echo "Running held-out flight $TEST_FLIGHT from RAW_REQUESTED_FLIGHTS=$RAW_REQUESTED_FLIGHTS"
          else
            echo "SELECTED_FLIGHT=false" >> "$GITHUB_ENV"
            echo "Skipping held-out flight $TEST_FLIGHT; RAW_REQUESTED_FLIGHTS=$RAW_REQUESTED_FLIGHTS"
          fi

      - name: Configure output directory
        if: env.SELECTED_FLIGHT == 'true'
        run: |
          set -euo pipefail
          echo "OUT_DIR=$RUNNER_TEMP/$OUT_SUBDIR" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/$OUT_SUBDIR"

      - name: Set up Python
        if: env.SELECTED_FLIGHT == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Ensure AADM2025Dryad dataset
        if: env.SELECTED_FLIGHT == 'true'
        id: dataset
        env:
          AADM2025DRYAD_DATA_URL: ${{ inputs.dataset_url || secrets.AADM2025DRYAD_DATA_URL || secrets.AADM2025DRYAD_URL || vars.AADM2025DRYAD_DATA_URL || vars.AADM2025DRYAD_URL }}
          AADM2025DRYAD_DATA_WEBDAV_URL: ${{ secrets.AADM2025DRYAD_DATA_WEBDAV_URL || vars.AADM2025DRYAD_DATA_WEBDAV_URL }}
          AADM2025DRYAD_DATA_KEY: ${{ secrets.AADM2025DRYAD_DATA_KEY || vars.AADM2025DRYAD_DATA_KEY }}
          AADM2025DRYAD_WEBDAV_CRED: ${{ secrets[format('{0}{1}{2}{3}{4}{5}{6}{7}', 'AADM2025DRYAD_DATA_', 'P', 'A', 'S', 'S', 'W', 'O', 'RD')] }}
        run: .github/scripts/ensure-aadm2025dryad-webdav.sh

      - name: Install package
        if: env.SELECTED_FLIGHT == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify learned-association CLIs
        if: env.SELECTED_FLIGHT == 'true'
        run: |
          set -euo pipefail
          python -m raft_uav.train_radar_association_cli --help >/dev/null
          python -m raft_uav.run_learned_radar_association_cli --help >/dev/null

      - name: Train leave-flight-out radar association model
        if: env.SELECTED_FLIGHT == 'true'
        run: |
          set -euo pipefail
          mkdir -p "$OUT_DIR"
          python -m raft_uav.train_radar_association_cli "$DATASET_ROOT" \
            --exclude-flight "$TEST_FLIGHT" \
            --radar-catprob-threshold "${{ inputs.radar_catprob_threshold }}" \
            --output-model "$OUT_DIR/radar_assoc.json" \
            --output-examples "$OUT_DIR/radar_assoc_examples.csv"

      - name: Run held-out stateful-beam association
        if: env.SELECTED_FLIGHT == 'true'
        run: |
          set -euo pipefail
          python -m raft_uav.run_learned_radar_association_cli "$DATASET_ROOT" \
            --flight "$TEST_FLIGHT" \
            --model "$OUT_DIR/radar_assoc.json" \
            --association-mode stateful-beam \
            --radar-catprob-threshold "${{ inputs.radar_catprob_threshold }}" \
            --beam-max-hypotheses "${{ inputs.beam_max_hypotheses }}" \
            --beam-max-candidates "${{ inputs.beam_max_candidates }}" \
            --beam-track-switch-cost "${{ inputs.beam_track_switch_cost }}" \
            --beam-lag-s "${{ inputs.beam_lag_s }}" \
            --robust-update nis-inflate \
            --rf-inflation-alpha "${{ inputs.rf_inflation_alpha }}" \
            --radar-inflation-alpha "${{ inputs.radar_inflation_alpha }}" \
            --rf-max-residual-m "${{ inputs.rf_max_residual_m }}" \
            --radar-max-residual-m "${{ inputs.radar_max_residual_m }}" \
            --smoother fixed-lag \
            --smoother-lag-s "${{ inputs.smoother_lag_s }}" \
            --output-dir "$OUT_DIR/run"

      - name: Write per-flight summary
        if: always() && env.SELECTED_FLIGHT == 'true'
        run: |
          set -euo pipefail
          mkdir -p "$OUT_DIR"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          flight = os.environ["TEST_FLIGHT"]
          out_dir = Path(os.environ["OUT_DIR"])
          metrics_path = out_dir / "run" / flight / "metrics.json"
          diagnostic_summary_path = out_dir / "run" / flight / "diagnostic_summary.json"
          summary_path = out_dir / "summary.json"
          summary = {
              "flight": flight,
              "status": "missing_metrics",
              "metrics_path": str(metrics_path),
              "diagnostic_summary_path": str(diagnostic_summary_path),
          }
          if metrics_path.exists():
              payload = json.loads(metrics_path.read_text(encoding="utf-8"))
              summary = {
                  "flight": payload.get("flight", flight),
                  "status": "ok",
                  "radar_association": payload.get("radar_association"),
                  "learned_radar_association_mode": payload.get("learned_radar_association_mode"),
                  "selected_radar_rows": payload.get("selected_radar_rows"),
                  "posterior_records": payload.get("posterior_records"),
                  "rmse_2d_m": payload.get("position_error_2d", {}).get("rmse_m"),
                  "p95_2d_m": payload.get("position_error_2d", {}).get("p95_m"),
                  "rmse_3d_m": payload.get("position_error_3d", {}).get("rmse_m"),
                  "p95_3d_m": payload.get("position_error_3d", {}).get("p95_m"),
                  "metrics_path": str(metrics_path),
                  "diagnostic_summary_path": str(diagnostic_summary_path),
              }
          summary_path.parent.mkdir(parents=True, exist_ok=True)
          summary_path.write_text(json.dumps(summary, indent=2), encoding="utf-8")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write(f"## LOFO {flight}\n\n```json\n")
              handle.write(json.dumps(summary, indent=2))
              handle.write("\n```\n")
          PY

      - name: Upload LOFO artifacts
        if: always() && env.SELECTED_FLIGHT == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: stateful-lofo-${{ matrix.flight }}
          retention-days: 30
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/stateful_lofo/${{ matrix.flight }}/summary.json
            ${{ runner.temp }}/stateful_lofo/${{ matrix.flight }}/radar_assoc.json
            ${{ runner.temp }}/stateful_lofo/${{ matrix.flight }}/radar_assoc_examples.csv
            ${{ runner.temp }}/stateful_lofo/${{ matrix.flight }}/run/*/metrics.json
            ${{ runner.temp }}/stateful_lofo/${{ matrix.flight }}/run/*/diagnostic_summary.json
            ${{ runner.temp }}/stateful_lofo/${{ matrix.flight }}/run/*/diagnostics.csv
            ${{ runner.temp }}/stateful_lofo/${{ matrix.flight }}/run/*/selected_radar.csv
            ${{ runner.temp }}/stateful_lofo/${{ matrix.flight }}/run/*/estimates.csv
            ${{ runner.temp }}/stateful_lofo/${{ matrix.flight }}/run/*/hypotheses.csv
            ${{ runner.temp }}/stateful_lofo/${{ matrix.flight }}/run/*/trajectory.png

      - name: Remove local LOFO output
        if: always() && env.SELECTED_FLIGHT == 'true'
        run: rm -rf "$OUT_DIR"

  aggregate:
    name: Aggregate LOFO metrics
    needs: lofo
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 30

    env:
      ENFORCE_THRESHOLDS: ${{ inputs.enforce_thresholds }}
      SMOKE_MODE: ${{ inputs.smoke_mode }}
      INPUT_FLIGHTS_RAW: ${{ inputs.smoke_mode && '[Opt1,Opt3]' || inputs.flights_json }}
      TARGET_MEAN_RMSE_3D_M: ${{ inputs.target_mean_rmse_3d_m }}
      TARGET_OPT1_P95_3D_M: ${{ inputs.target_opt1_p95_3d_m }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download LOFO artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Normalize requested flights
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re

          raw = os.environ.get("INPUT_FLIGHTS_RAW", "").strip()
          allowed = {"Opt1", "Opt2", "Opt3"}
          try:
              parsed = json.loads(raw)
              if not isinstance(parsed, list):
                  raise ValueError("flight input is not a list")
              flights = [str(item).strip() for item in parsed]
          except Exception:
              body = raw.strip()
              if body.startswith("[") and body.endswith("]"):
                  body = body[1:-1]
              flights = [part.strip().strip("'\"") for part in body.split(",") if part.strip()]
          unknown = [flight for flight in flights if flight not in allowed]
          if unknown:
              raise SystemExit(f"Unknown held-out flights {unknown}; allowed flights are {sorted(allowed)}")
          if not flights:
              raise SystemExit("No held-out flights requested")
          normalized = json.dumps(flights)
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"INPUT_FLIGHTS_JSON={normalized}\n")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write(f"Requested flights: `{normalized}`\n")
          PY

      - name: Aggregate metrics
        run: |
          set -euo pipefail
          python .github/scripts/aggregate_stateful_lofo.py \
            --artifacts-dir artifacts \
            --output lofo_aggregate_summary.json \
            --expected-flights-json "$INPUT_FLIGHTS_JSON" \
            --smoke-mode "$SMOKE_MODE" \
            --enforce-thresholds "$ENFORCE_THRESHOLDS" \
            --target-mean-rmse-3d-m "$TARGET_MEAN_RMSE_3D_M" \
            --target-opt1-p95-3d-m "$TARGET_OPT1_P95_3D_M"

      - name: Upload aggregate summary
        uses: actions/upload-artifact@v7
        with:
          name: stateful-lofo-aggregate-summary
          retention-days: 30
          path: lofo_aggregate_summary.json
