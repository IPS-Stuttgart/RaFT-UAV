name: Debug spatial MMUAD group top-K

on:
  pull_request:
    paths:
      - "src/raft_uav/mmuad/candidate_mixture_group_spatial_topk.py"
      - "tests/test_mmuad_candidate_mixture_group_spatial_topk.py"
      - ".github/workflows/debug-mmuad-spatial-group-topk.yml"
  workflow_dispatch:

jobs:
  concise-full-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install quietly
        run: python -m pip install -q -e ".[dev]"
      - name: Capture first failing test
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short --maxfail=1 > pytest.log 2>&1
          status=$?
          echo "$status" > pytest.exit
          exit 0
      - uses: actions/upload-artifact@v5
        with:
          name: spatial-group-topk-pytest-log
          path: |
            pytest.log
            pytest.exit
      - name: Fail when pytest failed
        shell: bash
        run: |
          if [ "$(cat pytest.exit)" != "0" ]; then
            tail -100 pytest.log
            exit 1
          fi
