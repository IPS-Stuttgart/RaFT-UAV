name: Debug spatial MMUAD group top-K

on:
  pull_request:
    paths:
      - "src/raft_uav/mmuad/candidate_mixture_group_spatial_topk.py"
      - "tests/test_mmuad_candidate_mixture_group_spatial_topk.py"
      - ".github/workflows/debug-mmuad-spatial-group-topk.yml"
  workflow_dispatch:

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install quietly
        run: python -m pip install -q -e ".[dev]"
      - name: Run focused tests
        run: python -m pytest tests/test_mmuad_candidate_mixture_group_spatial_topk.py -q
