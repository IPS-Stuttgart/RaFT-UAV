---
name: Diagnose candidate oracle gap

"on":
  pull_request:
    paths:
      - "src/raft_uav/mmuad/candidate_oracle_gap/**"
      - "tests/test_mmuad_candidate_oracle_gap_time_gate_validation.py"
      - ".github/workflows/diagnose-candidate-oracle-gap.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run focused regression
        id: focused
        continue-on-error: true
        run: |
          set -o pipefail
          pytest -vv tests/test_mmuad_candidate_oracle_gap_time_gate_validation.py --tb=long --junitxml=candidate-oracle-gap-junit.xml 2>&1 | tee candidate-oracle-gap-output.txt
      - name: Capture first full-suite failure
        id: full_suite
        continue-on-error: true
        run: |
          set -o pipefail
          pytest -x -vv --tb=long --junitxml=candidate-oracle-gap-full-suite-junit.xml 2>&1 | tee candidate-oracle-gap-full-suite-output.txt
      - name: Upload diagnostic report
        uses: actions/upload-artifact@v4
        with:
          name: candidate-oracle-gap-diagnostic
          path: |
            candidate-oracle-gap-junit.xml
            candidate-oracle-gap-output.txt
            candidate-oracle-gap-full-suite-junit.xml
            candidate-oracle-gap-full-suite-output.txt
          if-no-files-found: error
      - name: Fail when tests failed
        if: steps.focused.outcome != 'success' || steps.full_suite.outcome != 'success'
        run: exit 1
