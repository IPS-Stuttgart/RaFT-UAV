name: Apply catprob frame grouping fix

on:
  push:
    branches:
      - agent/fix-catprob-missing-frame-grouping

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-catprob-missing-frame-grouping
          fetch-depth: 0

      - name: Apply source and regression changes
        shell: python
        run: |
          from pathlib import Path

          source_path = Path("src/raft_uav/io/aerpaw.py")
          source = source_path.read_text(encoding="utf-8")
          old = '''def _radar_frame_group_column(radar: pd.DataFrame) -> str | None:
              for column in ("frame_index", "timestamp", "time_s"):
                  if column in radar.columns:
                      return column
              return None
          '''
          new = '''def _radar_frame_group_column(radar: pd.DataFrame) -> str | None:
              available = [
                  column
                  for column in ("frame_index", "timestamp", "time_s")
                  if column in radar.columns
              ]
              for column in available:
                  if bool(radar[column].notna().all()):
                      return column
              for column in available:
                  if bool(radar[column].notna().any()):
                      return column
              return None
          '''
          if old not in source:
              raise SystemExit("expected radar frame grouping block not found")
          source_path.write_text(source.replace(old, new, 1), encoding="utf-8")

          test_path = Path("tests/test_aerpaw_catprob_numeric_ranking.py")
          tests = test_path.read_text(encoding="utf-8")
          marker = "def test_catprob_best_per_frame_falls_back_from_incomplete_frame_index"
          if marker not in tests:
              tests += '''


def test_catprob_best_per_frame_falls_back_from_incomplete_frame_index() -> None:
    radar = pd.DataFrame(
        {
            "frame_index": [0, pd.NA, 1, pd.NA],
            "time_s": [10.0, 10.0, 11.0, 11.0],
            "cat_prob_uav": [0.8, 0.9, 0.7, 0.6],
            "track_id": [1, 2, 3, 4],
        }
    )

    selected = _catprob_best_per_frame_rows(radar, catprob_threshold=0.0)

    assert selected["track_id"].tolist() == [2, 3]


def test_catprob_best_per_frame_ignores_all_missing_frame_index() -> None:
    radar = pd.DataFrame(
        {
            "frame_index": [pd.NA, pd.NA, pd.NA, pd.NA],
            "time_s": [10.0, 10.0, 11.0, 11.0],
            "cat_prob_uav": [0.8, 0.9, 0.7, 0.6],
            "track_id": [1, 2, 3, 4],
        }
    )

    selected = _catprob_best_per_frame_rows(radar, catprob_threshold=0.0)

    assert selected["track_id"].tolist() == [2, 3]
'''
              test_path.write_text(tests, encoding="utf-8")

      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run focused tests
        run: python -m pytest -q tests/test_aerpaw_catprob_numeric_ranking.py tests/test_catprob_selection.py

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/raft_uav/io/aerpaw.py tests/test_aerpaw_catprob_numeric_ranking.py
          git diff --cached --check
          git commit -m "Fix catprob grouping with missing frame indices"
          git push origin HEAD:agent/fix-catprob-missing-frame-grouping
