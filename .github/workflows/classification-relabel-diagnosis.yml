---
name: Temporary classification relabel diagnosis

"on":
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Capture first failure
        run: |
          set +e
          pytest -q --maxfail=1 --tb=long > full-test-failure.log 2>&1
          status=$?
          tail -n 400 full-test-failure.log > first-test-failure.log
          printf '%s\n' "$status" > test-exit-code.txt
          exit 0

      - name: Upload diagnosis
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: classification-relabel-first-failure
          path: |
            first-test-failure.log
            test-exit-code.txt
