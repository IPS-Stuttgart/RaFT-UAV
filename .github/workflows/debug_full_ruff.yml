name: Debug full Ruff

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Run repository Ruff
        id: lint
        shell: bash
        run: |
          set +e
          ruff check src scripts tests > full_ruff.log 2>&1
          status=$?
          cat full_ruff.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload Ruff diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-ruff-log
          path: full_ruff.log
