name: Debug regularizer validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Validate regularizer patch
        id: validation
        shell: bash
        run: |
          set +e
          : > regularizer_validation.log
          ruff check \
            src/raft_uav/mmuad/track5_trajectory_regularizer/__init__.py \
            src/raft_uav/mmuad/track5_trajectory_regularizer/__main__.py \
            tests/test_mmuad_track5_trajectory_regularizer_final_weights.py \
            >> regularizer_validation.log 2>&1
          ruff_status=$?
          pytest \
            tests/test_mmuad_track5_trajectory_regularizer.py \
            tests/test_mmuad_track5_trajectory_regularizer_final_weights.py \
            -q >> regularizer_validation.log 2>&1
          pytest_status=$?
          cat regularizer_validation.log
          if [ "$ruff_status" -ne 0 ] || [ "$pytest_status" -ne 0 ]; then
            exit 1
          fi
      - name: Upload validation diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regularizer-validation-log
          path: regularizer_validation.log
