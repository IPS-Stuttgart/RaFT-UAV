---
name: Diagnose pytest failure

"on":
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies quietly
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"

      - name: Capture first pytest failure
        id: pytest
        continue-on-error: true
        run: |
          pytest -x --tb=short > pytest-failure.log 2>&1

      - name: Upload pytest failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-failure
          path: pytest-failure.log

      - name: Preserve pytest status
        if: steps.pytest.outcome == 'failure'
        run: exit 1
