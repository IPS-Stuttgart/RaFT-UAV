---
name: Apply candidate reservoir oracle sequence fix

"on":
  push:
    branches:
      - agent/fix-candidate-reservoir-oracle-sequence

permissions:
  contents: write

jobs:
  patch-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Patch truth CSV loading
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/raft_uav/mmuad/__init__.py")
          text = path.read_text(encoding="utf-8")
          old = "            truth = _normalize_truth_columns(_pd.read_csv(args.truth_csv))"
          new = """            truth = _normalize_truth_columns(
              _pd.read_csv(args.truth_csv, dtype=str, keep_default_na=False)
          )"""
          if text.count(old) != 1:
              raise SystemExit(f"expected exactly one truth CSV read, found {text.count(old)}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run focused regression
        run: python -m pytest tests/test_mmuad_candidate_reservoir_sequence_text.py -q

      - name: Commit validated fix and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/agent-fix-candidate-reservoir-oracle-sequence.yml
          git add src/raft_uav/mmuad/__init__.py
          git commit -m "Preserve oracle truth sequence identifiers"
          git push origin HEAD:agent/fix-candidate-reservoir-oracle-sequence
