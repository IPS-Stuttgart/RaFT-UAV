---
name: Ruff diagnostics

"on":
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Ruff 0.16.0
        run: python -m pip install --disable-pip-version-check --quiet ruff==0.16.0
      - name: Run Ruff
        run: ruff check src scripts tests
