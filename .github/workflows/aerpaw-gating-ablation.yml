---
name: AERPAW gating ablation

"on":
  workflow_dispatch:
    inputs:
      dataset_root:
        description: "Optional path on the self-hosted runner to an already extracted AADM2025Dryad dataset."
        required: false
        type: string
      dataset_url:
        description: "Optional URL to the AADM2025Dryad ZIP archive. Used only if local/cache/WebDAV sources are unavailable."
        required: false
        type: string
      flights:
        description: "Space-separated flight names to run."
        required: false
        default: "Opt1 Opt2 Opt3"
        type: string
      force_redownload:
        description: "Delete and repopulate the persistent AADM2025Dryad dataset cache before running."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"
  DATASET_ROOT: data/raw/AADM2025Dryad
  DATASET_ZIP: data/raw/AADM2025Dryad.zip
  PERSISTENT_DATASET_CACHE: ${{ github.workspace }}/.unused

jobs:
  opt-flight-ablation:
    name: Opt-flight CV vs NIS-gated CV ablation
    runs-on: [self-hosted, Linux]
    timeout-minutes: 720

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Ensure AADM2025Dryad dataset
        id: dataset
        uses: ./.github/actions/ensure-aadm2025dryad-dataset
        with:
          dataset-root: ${{ inputs.dataset_root }}
          output-root: data/raw/AADM2025Dryad
          force-redownload: ${{ inputs.force_redownload }}
          dataset-url: ${{ inputs.dataset_url || secrets.AADM2025DRYAD_DATA_URL || secrets.AADM2025DRYAD_URL || vars.AADM2025DRYAD_DATA_URL || vars.AADM2025DRYAD_URL }}
          dataset-zip: data/raw/AADM2025Dryad.zip
          cache-key: aadm2025dryad-${{ runner.os }}-v1
          webdav-url: ${{ secrets.AADM2025DRYAD_DATA_WEBDAV_URL || vars.AADM2025DRYAD_DATA_WEBDAV_URL }}
          webdav-user: ${{ secrets.AADM2025DRYAD_DATA_KEY || vars.AADM2025DRYAD_DATA_KEY }}
          webdav-password: ${{ secrets.AADM2025DRYAD_DATA_PASSWORD }}

      - name: Install package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run gating unit tests
        run: pytest -q tests/test_gating.py

      - name: Inspect selected flights
        run: |
          set -euo pipefail
          for flight in ${{ inputs.flights }}; do
            python -m raft_uav.cli inspect "$DATASET_ROOT" --flight "$flight"
          done

      - name: Run ungated and NIS-gated ablation
        run: |
          set -euo pipefail
          for flight in ${{ inputs.flights }}; do
            echo "::group::Ungated CV baseline $flight"
            python -m raft_uav.cli run-baseline "$DATASET_ROOT" \
              --flight "$flight" \
              --output-dir outputs/baseline_cv
            echo "::endgroup::"

            echo "::group::NIS-gated CV baseline $flight"
            python -m raft_uav.cli run-baseline "$DATASET_ROOT" \
              --flight "$flight" \
              --output-dir outputs/baseline_cv_nis_gated \
              --enable-gating \
              --rf-gate-prob 0.99 \
              --radar-gate-prob 0.99
            echo "::endgroup::"

            echo "::group::NIS-inflated CV baseline $flight"
            python -m raft_uav.cli run-baseline "$DATASET_ROOT" \
              --flight "$flight" \
              --output-dir outputs/baseline_cv_nis_inflated \
              --robust-update nis-inflate \
              --rf-gate-prob 0.99 \
              --radar-gate-prob 0.99 \
              --rf-inflation-alpha 1.0 \
              --radar-inflation-alpha 1.0
            echo "::endgroup::"
          done

      - name: Collect ablation table
        run: |
          set -euo pipefail
          python scripts/collect_gating_ablation.py \
            --baseline-dir outputs/baseline_cv \
            --gated-dir outputs/baseline_cv_nis_gated \
            --inflated-dir outputs/baseline_cv_nis_inflated \
            --output outputs/gating_ablation_opt1_opt3.csv \
            --flights ${{ inputs.flights }}
          cat outputs/gating_ablation_opt1_opt3.csv

      - name: Summarize dataset and outputs
        if: always()
        run: |
          {
            echo "## AERPAW gating ablation"
            echo
            echo "### Dataset size"
            echo '```text'
            du -sh "$DATASET_ROOT" 2>/dev/null || true
            du -sh "$PERSISTENT_DATASET_CACHE" 2>/dev/null || true
            echo '```'
            echo
            echo "### Result table"
            echo '```csv'
            cat outputs/gating_ablation_opt1_opt3.csv 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload compact ablation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: aerpaw-gating-ablation-${{ github.run_id }}
          retention-days: 14
          path: |
            outputs/gating_ablation_opt1_opt3.csv
            outputs/baseline_cv/*/metrics.json
            outputs/baseline_cv/*/diagnostic_summary.json
            outputs/baseline_cv/*/diagnostics.csv
            outputs/baseline_cv/*/trajectory.png
            outputs/baseline_cv_nis_gated/*/metrics.json
            outputs/baseline_cv_nis_gated/*/diagnostic_summary.json
            outputs/baseline_cv_nis_gated/*/diagnostics.csv
            outputs/baseline_cv_nis_gated/*/trajectory.png
            outputs/baseline_cv_nis_inflated/*/metrics.json
            outputs/baseline_cv_nis_inflated/*/diagnostic_summary.json
            outputs/baseline_cv_nis_inflated/*/diagnostics.csv
            outputs/baseline_cv_nis_inflated/*/trajectory.png
