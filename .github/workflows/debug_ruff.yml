name: Debug Ruff

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff-output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Capture Ruff diagnostics
        shell: bash
        run: |
          set +e
          {
            ruff --version
            env | grep '^RUFF_' || true
            echo '===== SETTINGS ====='
            ruff check --show-settings tests/test_time_offset_longest_track_identifiers.py
            echo '===== DEFAULT CHECK ====='
            ruff check src scripts tests
            echo "default_exit_status=$?"
            echo '===== EXPLICIT LEGACY DEFAULT CHECK ====='
            ruff check --select E4,E7,E9,F src scripts tests
            echo "explicit_exit_status=$?"
          } > ruff-output.txt 2>&1
          exit 0
      - name: Upload Ruff output
        uses: actions/upload-artifact@v4
        with:
          name: ruff-output
          path: ruff-output.txt
          if-no-files-found: error
