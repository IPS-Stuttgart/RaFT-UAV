---
name: Diagnose PR 1428 validation

"on":
  pull_request:
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'agent/preserve-sequence-id-csv-semantics'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v6
        with:
          ref: agent/preserve-sequence-id-csv-semantics

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with test dependencies
        run: python -m pip install -q -e ".[dev]"

      - name: Reproduce transformed working tree
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          workflow = yaml.safe_load(
              Path(".github/workflows/apply-pr-1428-source-fixes.yml").read_text()
          )
          step = next(
              item
              for item in workflow["jobs"]["apply"]["steps"]
              if item.get("name") == "Apply fixes and remove temporary diagnostics"
          )
          Path("/tmp/apply-pr-1428.sh").write_text(step["run"])
          PY
          bash /tmp/apply-pr-1428.sh

      - name: Capture validation output
        shell: bash
        run: |
          set +e
          {
            python -m compileall -q src tests
            ruff check \
              src/raft_uav/baselines/tracklet_viterbi.py \
              src/raft_uav/baselines/learned_tracklet_viterbi.py \
              tests/test_tracklet_viterbi_association.py \
              tests/test_tracklet_viterbi_reacquisition.py \
              tests/test_learned_tracklet_viterbi_initial_acquisition.py \
              tests/test_mmuad_class_probability_csv_sequence_id_validation.py
            pytest -q \
              tests/test_tracklet_viterbi_association.py \
              tests/test_tracklet_viterbi_reacquisition.py \
              tests/test_learned_tracklet_viterbi_initial_acquisition.py \
              tests/test_mmuad_class_probability_csv.py \
              tests/test_mmuad_class_probability_csv_duplicate_headers.py \
              tests/test_mmuad_class_probability_csv_sequence_whitespace.py \
              tests/test_mmuad_class_probability_csv_sequence_id_validation.py
            git diff --check
          } > validation.log 2>&1
          printf '%s\n' "$?" > validation.status
          cat validation.log
          exit 0

      - name: Upload validation output
        uses: actions/upload-artifact@v4
        with:
          name: pr-1428-validation
          path: |
            validation.log
            validation.status
          if-no-files-found: error
