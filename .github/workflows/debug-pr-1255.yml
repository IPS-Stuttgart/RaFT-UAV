---
name: Debug PR 1255 candidate reservoir

"on":
  pull_request:
  workflow_dispatch:

jobs:
  focused-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run focused regression file
        run: pytest -vv tests/test_mmuad_candidate_reservoir_sequence_text.py --maxfail=1
