---
name: Agent full-suite diagnostic

"on":
  pull_request:

permissions:
  contents: read

jobs:
  full-suite-output:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: python -m pip install -q -e ".[dev]"

      - name: Capture full pytest output
        shell: bash
        run: |
          set +e
          pytest -q --tb=short > full-pytest.txt 2>&1
          status=$?
          printf '%s\n' "$status" > full-pytest-status.txt
          tail -n 100 full-pytest.txt
          exit 0

      - name: Upload full pytest output
        uses: actions/upload-artifact@v4
        with:
          name: full-pytest
          path: |
            full-pytest.txt
            full-pytest-status.txt
          if-no-files-found: error
