---
name: Agent bias diagnostic

"on":
  pull_request:

permissions:
  contents: read

jobs:
  focused-bias-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: python -m pip install -q -e ".[dev]"

      - name: Capture focused pytest output
        shell: bash
        run: |
          set +e
          pytest -q \
            tests/test_bias_serialized_truth_time_sort.py \
            tests/test_bias_correct_frame_keep_uncorrected.py \
            > bias-pytest.txt 2>&1
          status=$?
          printf '%s\n' "$status" > bias-pytest-status.txt
          cat bias-pytest.txt
          exit 0

      - name: Upload focused pytest output
        uses: actions/upload-artifact@v4
        with:
          name: bias-pytest
          path: |
            bias-pytest.txt
            bias-pytest-status.txt
          if-no-files-found: error
