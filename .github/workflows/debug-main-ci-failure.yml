---
name: Debug shared pytest failure

"on":
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  first-failure:
    name: First pytest failure
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests and record concise failure
        shell: bash
        run: |
          set +e
          pytest -q --maxfail=1 > pytest.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > pytest-status.txt
          tail -n 240 pytest.log

      - name: Upload pytest diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-first-failure
          path: |
            pytest.log
            pytest-status.txt

      - name: Propagate pytest result
        shell: bash
        run: exit "$(cat pytest-status.txt)"
