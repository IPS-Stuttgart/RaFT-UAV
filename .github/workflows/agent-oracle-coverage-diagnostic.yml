---
name: Agent oracle coverage diagnostic

"on":
  pull_request:

permissions:
  contents: read

jobs:
  focused-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Capture focused pytest output
        shell: bash
        run: |
          set +e
          pytest -q \
            tests/test_oracle_coverage_identifier_validation.py \
            tests/test_oracle_coverage_large_identifier_precision.py \
            > oracle-coverage-pytest.txt 2>&1
          status=$?
          printf '%s\n' "$status" > oracle-coverage-status.txt
          cat oracle-coverage-pytest.txt
          exit 0

      - name: Upload focused pytest output
        uses: actions/upload-artifact@v4
        with:
          name: oracle-coverage-pytest
          path: |
            oracle-coverage-pytest.txt
            oracle-coverage-status.txt
          if-no-files-found: error
