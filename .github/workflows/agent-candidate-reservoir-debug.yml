name: Agent candidate reservoir diagnostic

"on":
  push:
    branches:
      - agent/scope-candidate-reservoir-csv-reader

permissions:
  contents: read

jobs:
  pytest-first-failure:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: python -m pip install -q -e ".[dev]"

      - name: Capture first pytest failure
        id: pytest
        shell: bash
        run: |
          set +e
          pytest -x -vv > pytest-first-failure.log 2>&1
          status=$?
          cat pytest-first-failure.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-first-failure
          path: pytest-first-failure.log
          if-no-files-found: error

      - name: Propagate pytest status
        if: always()
        shell: bash
        run: exit "${{ steps.pytest.outputs.status }}"
