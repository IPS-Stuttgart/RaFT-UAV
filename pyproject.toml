[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
addopts = "--basetemp=.pytest-tmp"
markers = [
    "integration: tests that require the external AERPAW/Dryad dataset",
]
