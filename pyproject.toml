[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "raft-uav"
version = "0.1.0"
description = "Radar-RF Fusion Tracking for UAVs"
readme = "README.md"
requires-python = ">=3.11,<3.15"
authors = [{ name = "Florian Pfaff" }]
dependencies = [
    "matplotlib>=3.8",
    "numpy>=1.26",
    "pandas>=2.2",
    "pyrecest @ git+https://github.com/FlorianPfaff/PyRecEst.git@main",
    "scipy>=1.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]

[project.scripts]
raft-uav = "raft_uav.cli:main"
raft-uav-imm = "raft_uav.imm_cli:main"
raft-uav-train-radar-association = "raft_uav.train_radar_association_cli:main"
raft-uav-run-learned-radar-association = "raft_uav.run_learned_radar_association_cli:main"
raft-uav-train-bias-model = "raft_uav.bias_cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "--basetemp=.pytest-tmp"
