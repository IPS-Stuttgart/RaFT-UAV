[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "raft-uav"
version = "0.1.0"
description = "Radar-RF Fusion Tracking for UAVs"
readme = "README.md"
requires-python = ">=3.11,<3.15"
authors = [{ name = "Florian Pfaff" }]
dependencies = [
    "matplotlib>=3.8",
    "numpy>=1.26",
    "pandas>=2.2",
    "PyYAML>=6.0.1",
    "pyrecest @ git+https://github.com/FlorianPfaff/PyRecEst.git@main",
    "scikit-learn>=1.4",
    "scipy>=1.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]
pointcloud = [
    "laspy[lazrs]>=2.5",
]

[project.scripts]
raft-uav = "raft_uav.tracklet_viterbi_cli:main"
raft-uav-legacy = "raft_uav.robust_cli:main"
raft-uav-heteroscedastic = "raft_uav.heteroscedastic_cli:main"
